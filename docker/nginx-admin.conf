server {
    listen 80;
    server_name admin-offers.crocobet.com;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the admin-api Fastify container
    location /api/ {
        proxy_pass http://admin-api:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded file serving through admin-api
    location /uploads/ {
        proxy_pass http://admin-api:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA: all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

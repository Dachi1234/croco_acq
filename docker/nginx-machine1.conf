# Machine 1 — Host Nginx (install on the VM, not in Docker)
# offers.crocobet.com → blog + API + upload proxy to Machine 2
#
# Place this at: /etc/nginx/sites-enabled/offers.crocobet.com
# SSL: use certbot or your company's certificate

server {
    listen 80;
    server_name offers.crocobet.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name offers.crocobet.com;

    # SSL — replace with your actual cert paths
    ssl_certificate     /etc/ssl/certs/offers.crocobet.com.crt;
    ssl_certificate_key /etc/ssl/private/offers.crocobet.com.key;

    # Uploads: proxy to Machine 2's admin-api (where files live)
    # Replace MACHINE2_INTERNAL_IP with Machine 2's actual IP
    location /uploads/ {
        proxy_pass http://MACHINE2_INTERNAL_IP:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache uploaded images on Machine 1 to reduce cross-machine traffic
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API: public read-only endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blog: Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}

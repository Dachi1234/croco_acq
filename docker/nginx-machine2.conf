# Machine 2 — Host Nginx (install on the VM, not in Docker)
# admin-offers.crocobet.com → admin panel + admin API
#
# Place this at: /etc/nginx/sites-enabled/admin-offers.crocobet.com
# SSL: use certbot or your company's certificate
# IMPORTANT: restrict access to VPN/internal network only

server {
    listen 80;
    server_name admin-offers.crocobet.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin-offers.crocobet.com;

    # SSL — replace with your actual cert paths
    ssl_certificate     /etc/ssl/certs/admin-offers.crocobet.com.crt;
    ssl_certificate_key /etc/ssl/private/admin-offers.crocobet.com.key;

    # Restrict to VPN / internal IPs only (uncomment and adjust)
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # deny all;

    # Allow Machine 1 to reach /uploads/ for the proxy
    # allow MACHINE1_IP;

    # Admin panel (Nginx container serves static SPA + proxies /api/)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct access to admin API (bypassing admin Nginx container)
    # This is used by Machine 1 to proxy /uploads/ requests
    location /uploads/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}

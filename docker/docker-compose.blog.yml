## Machine 1 — Public facing
## Hosts: offers.crocobet.com (blog) + public read-only API
## Uploads: proxied to Machine 2 at the host Nginx level
## Run: docker compose -f docker/docker-compose.blog.yml up -d

services:
  public-api:
    image: ${REGISTRY:-registry.gitlab.crocobet.com/crocosquad1/crocobet-offers}/public-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        ENTRY: index-public.js
    restart: unless-stopped
    env_file: .env.machine1
    environment:
      SERVER_PORT: "3003"
    ports:
      - "127.0.0.1:3003:3003"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  blog:
    image: ${REGISTRY:-registry.gitlab.crocobet.com/crocosquad1/crocobet-offers}/blog:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.blog
      args:
        NEXT_PUBLIC_API_URL: https://offers.crocobet.com
        NEXT_PUBLIC_SITE_URL: https://offers.crocobet.com
        NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-GTM-WRMD8Z5}
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://public-api:3003
      BLOG_REVALIDATE_SECRET: ${BLOG_REVALIDATE_SECRET}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      public-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
